:root {

  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }

/* LAYOUT */
#app { display: flex; height: 100vh; width: 100vw; }
#sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#content { flex: 1; overflow-y: auto; padding: 24px; }
#right-panel { width: 300px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* LOGO */
.logo { padding: 0 24px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.logo-text { font-family: var(--font-head); font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* NAV */
.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(192,132,252,0.06); }
.nav-icon { font-size: 18px; width: 20px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--accent); color: var(--bg); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; }

/* USER AREA */
.user-area { margin-top: auto; padding: 16px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; flex-shrink: 0; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-size: 13px; font-weight: 600; }
.user-handle { font-size: 11px; color: var(--muted); }

.page-title { font-family: var(--font-head); font-size: 20px; font-weight: 700; }
